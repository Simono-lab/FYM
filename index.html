<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0D1C2B">
<title>FreeYourMind</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box }
html { scroll-behavior:smooth }
body { font-family:'DM Sans',sans-serif; background:#0D1C2B; color:#F8F6F2; -webkit-font-smoothing:antialiased }

/* ── TOPBAR ── */
.topbar { display:flex; align-items:center; gap:14px; padding:0 32px; height:54px; background:rgba(10,21,32,.95); border-bottom:1px solid rgba(255,255,255,.06); position:sticky; top:0; z-index:100; backdrop-filter:blur(12px) }
.tb-logo { font-family:'Playfair Display',serif; font-size:1rem; font-weight:700; color:#F8F6F2; letter-spacing:.3px }
.tb-logo span { color:#C8956A; font-style:italic }
.tb-actions { display:flex; gap:8px; margin-left:auto; align-items:center }
.btn-tb { padding:5px 14px; border-radius:20px; border:1px solid rgba(255,255,255,.15); background:transparent; color:rgba(255,255,255,.7); font-size:.68rem; cursor:pointer; transition:all .2s; font-family:'DM Sans',sans-serif }
.btn-tb:hover { border-color:#C8956A; color:#C8956A; background:rgba(200,149,106,.1) }
.lang-toggle { display:flex; background:rgba(255,255,255,.08); border-radius:20px; padding:2px; gap:2px; border:1px solid rgba(255,255,255,.1) }
.lang-btn { padding:4px 10px; border-radius:16px; border:none; background:transparent; color:rgba(255,255,255,.45); font-size:.65rem; font-weight:600; cursor:pointer; transition:all .2s; font-family:'DM Sans',sans-serif; letter-spacing:.05em }
.lang-btn.active { background:#C8956A; color:#0D1C2B }

/* ── HERO ── */
.hero { min-height:calc(100dvh - 54px); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 32px; position:relative; overflow:hidden; text-align:center }
.hero::before { content:''; position:absolute; inset:0; background: radial-gradient(ellipse at 25% 40%, rgba(200,149,106,.08) 0%, transparent 55%), radial-gradient(ellipse at 75% 60%, rgba(26,46,68,.6) 0%, transparent 55%); pointer-events:none }
.hero-rule { position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg, transparent, #C8956A 30%, #C8956A 70%, transparent) }
.hero-inner { position:relative; max-width:500px }
.hero-lines { font-family:'Playfair Display',serif; font-size:clamp(1.6rem,5vw,2.5rem); font-weight:400; color:#F8F6F2; line-height:1.65; margin-bottom:32px }
.hero-lines span { display:block }
.hero-lines .muted { color:rgba(248,246,242,.4); font-size:clamp(1.3rem,4vw,2rem) }
.hero-pivot { font-size:clamp(.9rem,2.5vw,1.05rem); color:#C8956A; font-style:italic; font-family:'Playfair Display',serif; margin-bottom:52px; letter-spacing:.02em }
.hero-cta { display:inline-flex; align-items:center; gap:10px; padding:16px 40px; background:#C8956A; color:#0D1C2B; font-family:'DM Sans',sans-serif; font-size:.88rem; font-weight:700; letter-spacing:.04em; text-decoration:none; border:none; cursor:pointer; transition:all .22s; position:relative }
.hero-cta::after { content:''; position:absolute; bottom:-3px; right:-3px; width:100%; height:100%; border:1px solid rgba(200,149,106,.3); transition:all .22s }
.hero-cta:hover { background:#DEB08A; transform:translate(-2px,-2px) }
.hero-cta:hover::after { transform:translate(4px,4px) }
.hero-cta svg { width:14px; height:14px; transition:transform .2s }
.hero-cta:hover svg { transform:translateX(3px) }
.hero-scroll { position:absolute; bottom:32px; left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; gap:8px; cursor:pointer; opacity:.4; transition:opacity .2s; text-decoration:none; color:#F8F6F2 }
.hero-scroll:hover { opacity:.8 }
.hero-scroll span { font-size:.6rem; letter-spacing:3px; text-transform:uppercase }
.hero-scroll-line { width:1px; height:32px; background:linear-gradient(to bottom, #C8956A, transparent); animation:pulse 2s ease-in-out infinite }
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

/* ── CONTENT ── */
.content { background:#F5F3EF; color:#1A2E44 }
.content-inner { max-width:640px; margin:0 auto; padding:96px 32px 80px }
.intro-block { margin-bottom:72px }
.intro-block p { font-size:1rem; line-height:1.85; color:#2A3A4A; margin-bottom:20px }
.intro-block p:last-child { margin-bottom:0 }
.intro-block strong { color:#1A2E44; font-weight:600 }
.sep { display:flex; align-items:center; gap:16px; margin:56px 0 }
.sep-line { flex:1; height:1px; background:#E0DAD2 }
.sep-diamond { width:6px; height:6px; background:#C8956A; transform:rotate(45deg); flex-shrink:0 }
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:32px; margin-bottom:72px }
.col-label { font-size:.6rem; letter-spacing:4px; text-transform:uppercase; color:#C8956A; font-weight:600; margin-bottom:20px; display:flex; align-items:center; gap:10px }
.col-label::after { content:''; flex:1; height:1px; background:#E0DAD2 }
.col-item { display:flex; align-items:flex-start; gap:10px; margin-bottom:14px; font-size:.85rem; line-height:1.55; color:#4A5A6B }
.col-item::before { content:'—'; color:#C8956A; flex-shrink:0; margin-top:1px }
.does .col-item { color:#1A2E44 }
.closing-block { text-align:center; padding:64px 0 0; border-top:1px solid #E0DAD2 }
.closing-rule { width:40px; height:2px; background:#C8956A; margin:0 auto 32px }
.closing-block p { font-size:.95rem; line-height:1.85; color:#2A3A4A; margin-bottom:16px; max-width:520px; margin-left:auto; margin-right:auto }
.closing-sig { font-family:'Playfair Display',serif; font-size:1.15rem; font-style:italic; color:#8C9DAD; margin:40px 0 48px }
.closing-cta { display:inline-flex; align-items:center; gap:10px; padding:16px 40px; background:#1A2E44; color:#F8F6F2; font-family:'DM Sans',sans-serif; font-size:.88rem; font-weight:700; letter-spacing:.04em; text-decoration:none; cursor:pointer; border:none; transition:all .22s; position:relative }
.closing-cta::after { content:''; position:absolute; bottom:-3px; right:-3px; width:100%; height:100%; border:1px solid rgba(26,46,68,.25); transition:all .22s }
.closing-cta:hover { background:#243D58; transform:translate(-2px,-2px) }
.closing-cta:hover::after { transform:translate(4px,4px) }
.closing-cta svg { width:14px; height:14px; transition:transform .2s }
.closing-cta:hover svg { transform:translateX(3px) }

/* ── FOOTER ── */
.footer { background:#0A1520; padding:32px; text-align:center; border-top:1px solid rgba(255,255,255,.05) }
.footer p { font-size:.65rem; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,.2) }

/* ── ANIMATIONS ── */
.fade-up { opacity:0; transform:translateY(20px); transition:opacity .7s ease, transform .7s ease }
.fade-up.visible { opacity:1; transform:translateY(0) }
.fade-up:nth-child(2){transition-delay:.1s}
.fade-up:nth-child(3){transition-delay:.2s}
.fade-up:nth-child(4){transition-delay:.3s}

@media(max-width:560px) {
  .two-col { grid-template-columns:1fr; gap:40px }
  .content-inner { padding:72px 20px 64px }
  .hero { padding:48px 20px }
  .topbar { padding:0 16px; gap:10px }
  .tb-logo { font-size:.9rem }
  .lang-toggle { display:flex }
  .hero-lines { font-size:clamp(1.4rem,6vw,2rem) }
  .hero-pivot { font-size:.9rem }
  .hero-cta { padding:14px 28px; font-size:.82rem }
  .closing-cta { padding:14px 28px; font-size:.82rem }
  .intro-block p { font-size:.92rem }
}
@media(max-width:380px) {
  .lang-btn { padding:3px 7px; font-size:.58rem }
  .hero { padding:40px 16px }
  .content-inner { padding:60px 16px 48px }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-logo">Free<span>YourMind</span></div>
  <div class="tb-actions">
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-fr" onclick="setLang('fr')">FR</button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
</div>

<!-- HERO -->
<section class="hero" id="hero">
  <div class="hero-rule"></div>
  <div class="hero-inner">
    <div class="hero-lines" id="hero-lines">
      <!-- Filled by JS -->
    </div>
    <div class="hero-pivot" id="hero-pivot"></div>
    <a class="hero-cta" id="hero-cta" href="app.html#questionnaire">
      <span id="cta-text"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12,5 19,12 12,19"/></svg>
    </a>
  </div>
  <a class="hero-scroll" href="#content">
    <span id="scroll-label"></span>
    <div class="hero-scroll-line"></div>
  </a>
</section>

<!-- CONTENT -->
<section class="content" id="content">
  <div class="content-inner">

    <div class="intro-block fade-up" id="intro-block">
      <!-- Filled by JS -->
    </div>

    <div class="sep fade-up">
      <div class="sep-line"></div><div class="sep-diamond"></div><div class="sep-line"></div>
    </div>

    <div class="two-col fade-up">
      <div class="col-block">
        <div class="col-label" id="col-label-not"></div>
        <div id="col-not"></div>
      </div>
      <div class="col-block does">
        <div class="col-label" id="col-label-does"></div>
        <div id="col-does"></div>
      </div>
    </div>

    <div class="closing-block fade-up">
      <div class="closing-rule"></div>
      <p id="closing-p"></p>
      <div class="closing-sig" id="closing-sig"></div>
      <a class="closing-cta" id="closing-cta" href="app.html#questionnaire">
        <span id="closing-cta-text"></span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12,5 19,12 12,19"/></svg>
      </a>
    </div>

  </div>
</section>

<div class="footer"><p id="footer-text"></p></div>

<script>
const CONTENT = {
  fr: {
    hero_lines: ['Vous vous connaissez bien.','Vous avez lu.','Vous avez travaillé sur vous-même.','Vous avez essayé de changer.','&nbsp;','Et pourtant,','des freins persistent.'],
    hero_muted: [false,false,false,true,false,false,false],
    pivot: 'Il y a une raison à ça.',
    cta: 'Commencer mon étude',
    scroll: 'En savoir plus',
    intro: `<p>Il existe de très nombreux modèles d'analyse de la psyché humaine. Ils sont tous utiles — mais chacun éclaire une facette différente : profils de personnalité, structures d'ombre, généalogie, cycles temporels.</p>
<p>Pris séparément, aucun ne produit une image complète. Il n'existe pas de solution aujourd'hui pour avoir une vision absolue de la structure humaine interne.</p>
<p><strong>FYM n'a pas cette ambition.</strong></p>
<p>En revanche, en rapprochant des modèles indépendants choisis pour leur complémentarité, il devient possible d'identifier leurs synergies — et leurs contradictions. Ce sont précisément ces contradictions qui correspondent à nos conflits intérieurs les plus actifs.</p>
<p>Les voir nommées avec précision, depuis plusieurs angles simultanément, produit quelque chose que chaque approche isolée ne peut pas produire : <strong>une cartographie des structures sous-jacentes de la personnalité.</strong></p>
<p>FYM est le résultat de ce croisement appliqué à un individu unique.</p>`,
    col_not: 'FYM ne fait pas',
    col_does: 'FYM fait',
    not_items: ['Il ne dit pas qui vous êtes','Il ne dit pas qui vous devriez être','Il ne propose pas de programme de transformation','Il ne cherche pas à vous valider, vous encourager ou à vous consoler'],
    does_items: ['Il montre comment la structure identitaire s\'est construite','Il nomme les mécaniques qui tournent automatiquement','Il identifie ce qui freine et ce qui est déjà là','Il ouvre vers ce qui devient possible quand ces mécaniques sont vues — non comme des défauts à corriger, mais comme une architecture à reconnaître'],
    closing_p: 'Un questionnaire. Douze approches croisées. Une note de synthèse construite pour un seul individu — vous.',
    sig: '« La créativité ne se libère pas. Elle se révèle. »',
    footer: 'FreeYourMind · Document confidentiel'
  },
  en: {
    hero_lines: ['You know yourself well.','You have read.','You have worked on yourself.','You have tried to change.','&nbsp;','And yet,','obstacles persist.'],
    hero_muted: [false,false,false,true,false,false,false],
    pivot: 'There is a reason for that.',
    cta: 'Start my study',
    scroll: 'Learn more',
    intro: `<p>There are many models for analysing the human psyche. They are all useful — but each illuminates a different facet: personality profiles, shadow structures, genealogy, temporal cycles.</p>
<p>Taken separately, none produces a complete picture. There is no solution today for an absolute view of the human internal structure.</p>
<p><strong>FYM does not have that ambition.</strong></p>
<p>However, by bringing together independent models chosen for their complementarity, it becomes possible to identify their synergies — and their contradictions. These contradictions are precisely what correspond to our most active inner conflicts.</p>
<p>Seeing them named with precision, from multiple angles simultaneously, produces something that no isolated approach can produce: <strong>a mapping of the underlying structures of personality.</strong></p>
<p>FYM is the result of this crossover applied to one unique individual.</p>`,
    col_not: 'FYM does not',
    col_does: 'FYM does',
    not_items: ['It does not tell you who you are','It does not tell you who you should be','It does not propose a transformation programme','It does not seek to validate, encourage or console you'],
    does_items: ['It shows how the identity structure was built','It names the mechanics that run automatically','It identifies what is holding back and what is already there','It opens towards what becomes possible when these mechanics are seen — not as flaws to correct, but as an architecture to recognise'],
    closing_p: 'One questionnaire. Twelve crossed approaches. A synthesis note built for one individual — you.',
    sig: '"Creativity is not gained, it is revealed."',
    footer: 'FreeYourMind · Confidential document'
  }
};

let LANG = (navigator.language||'fr').toLowerCase().startsWith('fr') ? 'fr' : 'en';

function setLang(l) {
  LANG = l;
  document.getElementById('btn-fr').classList.toggle('active', l==='fr');
  document.getElementById('btn-en').classList.toggle('active', l==='en');
  document.documentElement.lang = l;
  renderContent();
  // Also update app link lang param
  document.getElementById('hero-cta').href = `app.html#questionnaire`;
  document.getElementById('closing-cta').href = `app.html#questionnaire`;
  localStorage.setItem('fym_landing_lang', l);
}

function renderContent() {
  const C = CONTENT[LANG];

  // Hero lines
  const linesEl = document.getElementById('hero-lines');
  linesEl.innerHTML = C.hero_lines.map((l,i) =>
    `<span class="${C.hero_muted[i]?'muted':''}" style="opacity:0;transform:translateY(12px);transition:opacity .6s ease ${i*.08}s,transform .6s ease ${i*.08}s">${l}</span>`
  ).join('');

  document.getElementById('hero-pivot').textContent = C.pivot;
  document.getElementById('cta-text').textContent = C.cta;
  document.getElementById('scroll-label').textContent = C.scroll;
  document.getElementById('intro-block').innerHTML = C.intro;
  document.getElementById('col-label-not').textContent = C.col_not;
  document.getElementById('col-label-does').textContent = C.col_does;
  document.getElementById('col-not').innerHTML = C.not_items.map(i=>`<div class="col-item">${i}</div>`).join('');
  document.getElementById('col-does').innerHTML = C.does_items.map(i=>`<div class="col-item">${i}</div>`).join('');
  document.getElementById('closing-p').textContent = C.closing_p;
  document.getElementById('closing-sig').textContent = C.sig;
  document.getElementById('closing-cta-text').textContent = C.cta;
  document.getElementById('footer-text').textContent = C.footer;

  // Trigger hero animation
  setTimeout(() => {
    document.querySelectorAll('#hero-lines span').forEach(s => {
      s.style.opacity = '1'; s.style.transform = 'translateY(0)';
    });
    const pivot = document.getElementById('hero-pivot');
    pivot.style.opacity = '0';
    pivot.style.transition = 'opacity .8s ease .8s';
    setTimeout(()=>pivot.style.opacity='1', 50);
  }, 100);
}

// Scroll animation
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.15 });
document.querySelectorAll('.fade-up').forEach(el => obs.observe(el));

// Init
const saved = localStorage.getItem('fym_landing_lang');
if(saved) LANG = saved;
setLang(LANG);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0D1C2B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="FYM">
<title>FreeYourMind</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  /* Light editorial palette */
  --bg: #F5F3EF;
  --bg2: #EDE9E3;
  --surface: #FFFFFF;
  --surface2: #FAF9F6;
  --border: #E0DAD2;
  --border-mid: #C8BFB4;

  /* Navy */
  --navy: #0D1C2B;
  --navy2: #1A2E44;
  --navy3: #243D58;
  --navy-soft: #E8EDF3;

  /* Gold */
  --gold: #C8956A;
  --gold2: #DEB08A;
  --gold-pale: #F5EDE4;
  --gold-border: rgba(200,149,106,.3);

  /* Text */
  --text: #1A2E44;
  --text2: #4A5A6B;
  --text3: #7A8A98;
  --text-inv: #F8F6F2;

  /* Status */
  --ok: #3D7A55;
  --ok-bg: #EBF5EF;
  --warn: #8B6914;
  --warn-bg: #FEF8E7;

  /* Shadows */
  --sh-sm: 0 1px 4px rgba(26,46,68,.08), 0 2px 12px rgba(26,46,68,.06);
  --sh: 0 2px 8px rgba(26,46,68,.1), 0 8px 32px rgba(26,46,68,.08);
  --sh-lg: 0 8px 32px rgba(26,46,68,.15);

  --r: 12px;
  --rs: 8px;
  --tr: all .2s cubic-bezier(.4,0,.2,1);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent }
html, body { height:100% }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased }

/* ── APP SHELL ── */
#root { height:100dvh; display:flex; flex-direction:column; overflow:hidden }
.page { flex:1; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--border) transparent }

/* ── TOPBAR ── */
.topbar {
  display:flex; align-items:center; gap:12px;
  padding:0 28px; height:54px;
  background:var(--navy); flex-shrink:0;
  position:relative; z-index:100;
}
.topbar::after { content:''; position:absolute; bottom:0; left:0; right:0; height:1px; background:rgba(255,255,255,.06) }
.tb-logo { font-family:'Playfair Display',serif; font-size:1rem; font-weight:700; color:#F8F6F2; cursor:pointer; letter-spacing:.3px; flex-shrink:0 }
.tb-logo span { color:var(--gold); font-style:italic }
.tb-sep { width:1px; height:18px; background:rgba(255,255,255,.12); flex-shrink:0 }
.tb-breadcrumb { font-size:.72rem; color:rgba(255,255,255,.45); flex:1 }
.tb-breadcrumb em { color:rgba(200,149,106,.9) }
.tb-actions { display:flex; gap:8px; margin-left:auto }
.btn-tb { padding:5px 14px; border-radius:20px; border:1px solid rgba(255,255,255,.15); background:transparent; color:rgba(255,255,255,.7); font-size:.68rem; cursor:pointer; transition:var(--tr); font-family:'DM Sans',sans-serif; white-space:nowrap }
.btn-tb:hover { border-color:var(--gold); color:var(--gold); background:rgba(200,149,106,.1) }
.btn-tb.primary { background:var(--gold); border-color:var(--gold); color:var(--navy); font-weight:600 }
.btn-tb.primary:hover { filter:brightness(1.08) }

/* ── BUTTONS ── */
.btn { display:inline-flex; align-items:center; gap:8px; padding:10px 22px; border-radius:var(--rs); border:none; font-size:.82rem; font-weight:500; cursor:pointer; transition:var(--tr); font-family:'DM Sans',sans-serif }
.btn-primary { background:var(--gold); color:var(--navy); font-weight:600 }
.btn-primary:hover { background:var(--gold2); transform:translateY(-1px); box-shadow:0 4px 16px rgba(200,149,106,.3) }
.btn-secondary { background:var(--surface); color:var(--text2); border:1px solid var(--border) }
.btn-secondary:hover { border-color:var(--gold); color:var(--gold) }
.btn-ghost { background:transparent; color:var(--text3); border:1px solid var(--border) }
.btn-ghost:hover { background:var(--surface); color:var(--text) }
.btn-sm { padding:7px 16px; font-size:.75rem }
.btn-xs-light { padding:5px 12px; border-radius:20px; border:1px solid var(--border); background:var(--surface); color:var(--text2); font-size:.68rem; cursor:pointer; transition:var(--tr); font-family:'DM Sans',sans-serif }
.btn-xs-light:hover { border-color:var(--gold); color:var(--gold) }
.btn-danger { background:transparent; border:1px solid #E0B0B0; color:#B05050 }
.btn-danger:hover { background:#FEF0F0 }
.btn:disabled { opacity:.45; cursor:default; transform:none !important }

/* ── LANDING ── */
.landing { min-height:100%; display:flex; flex-direction:column }
.landing-hero {
  background:var(--navy); color:var(--text-inv);
  padding:80px 48px; display:flex; align-items:center; justify-content:center; min-height:70vh;
  position:relative; overflow:hidden;
}
.landing-hero::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse at 20% 50%,rgba(200,149,106,.1) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 50%,rgba(26,46,68,.5) 0%,transparent 60%);
}
.landing-inner { position:relative; max-width:560px; text-align:center }
.landing-badge { display:inline-block; padding:4px 14px; border:1px solid var(--gold-border); border-radius:20px; font-size:.62rem; letter-spacing:3px; text-transform:uppercase; color:var(--gold); margin-bottom:24px }
.landing-title { font-family:'Playfair Display',serif; font-size:clamp(2.5rem,6vw,4rem); font-weight:700; line-height:1.1; color:#F8F6F2; margin-bottom:16px }
.landing-title em { color:var(--gold); font-style:italic }
.landing-sub { font-size:.9rem; color:rgba(248,246,242,.65); line-height:1.75; margin-bottom:48px }
.landing-ctas { display:flex; gap:14px; justify-content:center; flex-wrap:wrap }
.landing-footer { background:var(--surface2); border-top:1px solid var(--border); padding:40px 48px; text-align:center }
.lf-tagline { font-family:'Playfair Display',serif; font-style:italic; color:var(--text3); font-size:.9rem }

/* ── WIZARD NAV ── */
.wiz-nav {
  position:sticky; top:0; z-index:80;
  background:var(--surface); border-bottom:1px solid var(--border);
  box-shadow:var(--sh-sm);
  padding:0 24px;
  display:flex; align-items:center; gap:12px; height:52px;
  flex-shrink:0;
}
.wiz-home { display:flex; align-items:center; gap:6px; color:var(--text3); font-size:.75rem; cursor:pointer; transition:var(--tr); text-decoration:none; flex-shrink:0 }
.wiz-home:hover { color:var(--gold) }
.wiz-home svg { width:14px; height:14px }
.wiz-nav-sep { width:1px; height:20px; background:var(--border); flex-shrink:0 }
.wiz-sections { display:flex; gap:4px; flex:1 }
.wiz-sec-btn { width:32px; height:32px; border-radius:50%; border:1.5px solid var(--border); background:transparent; color:var(--text3); font-size:.72rem; font-weight:600; cursor:pointer; transition:var(--tr); font-family:'DM Sans',sans-serif; display:flex; align-items:center; justify-content:center }
.wiz-sec-btn:hover { border-color:var(--gold); color:var(--gold) }
.wiz-sec-btn.active { background:var(--gold); border-color:var(--gold); color:var(--navy); box-shadow:0 2px 8px rgba(200,149,106,.35) }
.wiz-sec-btn.done { background:var(--ok-bg); border-color:var(--ok); color:var(--ok) }
.wiz-progress-wrap { flex:1; max-width:120px }
.wiz-progress-track { height:3px; background:var(--border); border-radius:2px; overflow:hidden }
.wiz-progress-fill { height:100%; background:var(--gold); border-radius:2px; transition:width .4s ease }
.wiz-progress-label { font-size:.6rem; color:var(--text3); margin-top:3px; text-align:right }
.wiz-arrows { display:flex; gap:6px; flex-shrink:0 }
.wiz-arrow { width:34px; height:34px; border-radius:var(--rs); border:1px solid var(--border); background:var(--surface); color:var(--text2); cursor:pointer; transition:var(--tr); display:flex; align-items:center; justify-content:center }
.wiz-arrow:hover:not(:disabled) { border-color:var(--navy2); background:var(--navy2); color:#fff }
.wiz-arrow:disabled { opacity:.3; cursor:default }
.wiz-arrow svg { width:14px; height:14px }

/* ── QUESTIONNAIRE ── */
.wizard-body { max-width:700px; margin:0 auto; padding:36px 24px 80px }
.wsec { background:var(--surface); border-radius:var(--r); box-shadow:var(--sh-sm); overflow:hidden; margin-bottom:20px }
.wsec-head { padding:24px 28px 20px; border-bottom:1px solid var(--border); display:flex; align-items:flex-end; gap:16px; background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%) }
.wsec-letter { font-family:'Playfair Display',serif; font-size:3.5rem; color:var(--gold); line-height:1 }
.wsec-info { padding-bottom:4px }
.wsec-suplabel { font-size:.58rem; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,.4) }
.wsec-title { font-family:'Playfair Display',serif; font-size:1.15rem; color:#F8F6F2; line-height:1.2 }
.wsec-intro { font-size:.75rem; color:rgba(255,255,255,.5); font-style:italic; margin-top:4px; line-height:1.5 }
.wsec-body { padding:24px 28px }

.wf { margin-bottom:16px }
.wlabel { font-size:.65rem; font-weight:500; letter-spacing:.07em; text-transform:uppercase; color:var(--text3); margin-bottom:6px; display:block }
.winput { width:100%; padding:9px 13px; background:var(--bg); border:1.5px solid var(--border); border-radius:var(--rs); color:var(--text); font-family:'DM Sans',sans-serif; font-size:.85rem; outline:none; transition:var(--tr) }
.winput:focus { border-color:var(--gold); background:var(--surface); box-shadow:0 0 0 3px rgba(200,149,106,.12) }
.winput::placeholder { color:var(--text3); opacity:.7 }
textarea.winput { resize:vertical; min-height:80px; line-height:1.6 }
textarea.winput.tall { min-height:110px }
textarea.winput.xtall { min-height:150px }

.wg2 { display:grid; grid-template-columns:1fr 1fr; gap:12px }
.wg3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px }
.wdiv { height:1px; background:var(--border); margin:20px 0 }

.wchk { display:flex; align-items:flex-start; gap:10px; padding:9px 12px; border-radius:var(--rs); cursor:pointer; transition:var(--tr); font-size:.82rem; color:var(--text2); line-height:1.45; user-select:none }
.wchk:hover { background:var(--gold-pale) }
.wchk.on { background:var(--gold-pale); color:var(--navy2) }
.wchk-box { width:18px; height:18px; border-radius:5px; border:1.5px solid var(--border-mid); flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; transition:var(--tr); background:var(--surface) }
.wchk.on .wchk-box { background:var(--gold); border-color:var(--gold) }
.wchk-box svg { display:none; width:10px; height:10px }
.wchk.on .wchk-box svg { display:block }

.wrad-grid { display:grid; grid-template-columns:1fr 1fr; gap:2px }
.wrad { display:flex; align-items:flex-start; gap:9px; padding:9px 12px; border-radius:var(--rs); cursor:pointer; transition:var(--tr); font-size:.8rem; color:var(--text3); line-height:1.4; user-select:none; border:1.5px solid transparent }
.wrad:hover { background:var(--gold-pale); color:var(--text2) }
.wrad.on { background:var(--gold-pale); border-color:var(--gold-border); color:var(--navy2) }
.wrad-letter { font-size:.65rem; font-weight:700; color:var(--gold); width:14px; flex-shrink:0; margin-top:2px; font-family:'DM Mono',monospace }
.wrad-dot { width:14px; height:14px; border-radius:50%; border:1.5px solid var(--border-mid); flex-shrink:0; margin-top:2px; transition:var(--tr); background:var(--surface) }
.wrad.on .wrad-dot { border-color:var(--gold); background:var(--gold) }

.lieu-row { display:grid; grid-template-columns:22px 3fr 1fr; gap:8px; align-items:center; margin-bottom:6px }
.lieu-num { font-size:.7rem; color:var(--text3); text-align:right; font-family:'DM Mono',monospace }

.wq-text { font-size:.85rem; color:var(--text); line-height:1.65; margin-bottom:10px }
.wq-num { color:var(--gold); font-size:.68rem; font-family:'DM Mono',monospace; margin-right:5px; font-weight:700 }

.wiz-footer { display:flex; align-items:center; justify-content:space-between; background:var(--surface); border-top:1px solid var(--border); padding:16px 24px; position:sticky; bottom:0; z-index:70; box-shadow:0 -2px 12px rgba(26,46,68,.06) }
.wiz-footer-info { font-size:.72rem; color:var(--text3) }
.wiz-footer-actions { display:flex; gap:10px }

/* ── SUCCESS ── */
.success-page { max-width:540px; margin:0 auto; padding:60px 24px }
.success-icon { width:64px; height:64px; border-radius:50%; background:var(--ok-bg); border:2px solid var(--ok); display:flex; align-items:center; justify-content:center; margin:0 auto 24px; font-size:1.6rem; color:var(--ok) }
.success-title { font-family:'Playfair Display',serif; font-size:1.8rem; color:var(--text); text-align:center; margin-bottom:10px }
.success-sub { text-align:center; font-size:.85rem; color:var(--text2); line-height:1.7; margin-bottom:36px }

.code-card { background:var(--surface); border-radius:var(--r); box-shadow:var(--sh-sm); overflow:hidden; margin-bottom:16px; border:1px solid var(--border) }
.code-card-head { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border); background:var(--bg) }
.code-card-label { font-size:.62rem; letter-spacing:3px; text-transform:uppercase; color:var(--text3) }
.code-body { padding:14px 16px; font-family:'DM Mono',monospace; font-size:.7rem; color:var(--text2); line-height:1.6; word-break:break-all; max-height:100px; overflow-y:auto }

.info-box { background:var(--gold-pale); border:1px solid var(--gold-border); border-radius:var(--rs); padding:14px 18px; font-size:.8rem; color:var(--text2); line-height:1.65 }
.info-box strong { color:var(--navy2) }

/* ── PRODUCTION ── */
.prod-page { max-width:1080px; margin:0 auto; padding:36px 28px 80px }
.prod-title { font-family:'Playfair Display',serif; font-size:2rem; color:var(--text); margin-bottom:4px }
.prod-sub { font-size:.82rem; color:var(--text3); margin-bottom:32px }

.apikey-bar { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:16px 20px; margin-bottom:24px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; box-shadow:var(--sh-sm) }
.apikey-tag { font-size:.65rem; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--text3); flex-shrink:0 }
.apikey-input { flex:1; min-width:220px; padding:8px 12px; background:var(--bg); border:1.5px solid var(--border); border-radius:var(--rs); color:var(--text); font-family:'DM Mono',monospace; font-size:.75rem; outline:none; transition:var(--tr) }
.apikey-input:focus { border-color:var(--gold) }
.apikey-set { display:flex; align-items:center; gap:6px; font-size:.78rem; color:var(--ok); flex-shrink:0 }
.apikey-set::before { content:'✓'; font-weight:700 }

.prod-actions { display:flex; gap:10px; margin-bottom:28px; flex-wrap:wrap }

.profiles-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px }
.profile-card {
  background:var(--surface); border-radius:var(--r); box-shadow:var(--sh-sm);
  border:1.5px solid var(--border); padding:22px 22px 18px;
  cursor:pointer; transition:var(--tr); position:relative;
}
.profile-card:hover { border-color:var(--gold); box-shadow:var(--sh); transform:translateY(-2px) }
.profile-card-accent { position:absolute; top:0; left:0; right:0; height:3px; background:var(--border); border-radius:var(--r) var(--r) 0 0; transition:var(--tr) }
.profile-card:hover .profile-card-accent { background:var(--gold) }
.profile-card-name { font-family:'Playfair Display',serif; font-size:1.1rem; color:var(--text); margin-bottom:4px; padding-right:28px }
.profile-card-meta { font-size:.72rem; color:var(--text3); margin-bottom:16px }
.profile-card-bar { height:4px; background:var(--border); border-radius:2px; overflow:hidden; margin-bottom:10px }
.profile-card-fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold2)); border-radius:2px; transition:width .5s ease }
.profile-card-stats { display:flex; gap:20px }
.pstat { font-size:.7rem; color:var(--text3) }
.pstat strong { color:var(--text2); font-weight:600 }
.profile-del { position:absolute; top:14px; right:14px; width:26px; height:26px; border-radius:50%; border:1px solid transparent; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:var(--tr); color:var(--text3); font-size:.8rem; opacity:0 }
.profile-card:hover .profile-del { opacity:1 }
.profile-del:hover { background:#FEF0F0; border-color:#E0B0B0; color:#B05050 }
.add-card { background:transparent; border:1.5px dashed var(--border-mid); border-radius:var(--r); padding:22px; cursor:pointer; transition:var(--tr); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; color:var(--text3); min-height:130px }
.add-card:hover { border-color:var(--gold); color:var(--gold); background:var(--gold-pale) }
.add-card-icon { font-size:1.8rem; opacity:.5 }
.add-card-label { font-size:.82rem }

/* ── PROFILE LAYOUT ── */
.profile-shell { display:flex; height:calc(100dvh - 54px); overflow:hidden }
.profile-side { width:230px; flex-shrink:0; background:var(--navy); overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--navy3) transparent; display:flex; flex-direction:column }
.ps-top { padding:20px 18px 14px; border-bottom:1px solid rgba(255,255,255,.07) }
.ps-name { font-family:'Playfair Display',serif; font-size:.95rem; color:#F8F6F2; margin-bottom:3px }
.ps-dob { font-size:.65rem; color:rgba(255,255,255,.35) }
.ps-prog-wrap { padding:12px 18px; border-bottom:1px solid rgba(255,255,255,.07) }
.ps-prog-track { height:2px; background:rgba(255,255,255,.1); border-radius:2px; overflow:hidden; margin-bottom:5px }
.ps-prog-fill { height:100%; background:var(--gold); border-radius:2px; transition:width .5s }
.ps-prog-label { font-size:.6rem; color:rgba(255,255,255,.3); display:flex; justify-content:space-between }
.ps-nav { flex:1; padding:8px 0 }
.ps-item { display:flex; align-items:center; gap:9px; padding:8px 18px; cursor:pointer; transition:var(--tr); border-left:2px solid transparent }
.ps-item:hover { background:rgba(255,255,255,.04) }
.ps-item.active { background:rgba(200,149,106,.12); border-left-color:var(--gold) }
.ps-item-num { font-family:'DM Mono',monospace; font-size:.58rem; color:rgba(255,255,255,.3); width:18px; flex-shrink:0 }
.ps-item.active .ps-item-num { color:var(--gold) }
.ps-item-label { font-size:.76rem; color:rgba(255,255,255,.55); flex:1; line-height:1.3 }
.ps-item.active .ps-item-label { color:#F8F6F2 }
.ps-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0 }
.d-todo { background:rgba(255,255,255,.15) }
.d-active { background:var(--gold); box-shadow:0 0 4px var(--gold) }
.d-done { background:#5A9A6A }
.ps-divider { height:1px; background:rgba(255,255,255,.07); margin:6px 18px }
.ps-foot { padding:12px 16px; border-top:1px solid rgba(255,255,255,.07) }

.profile-main { flex:1; background:var(--bg); overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--border) transparent }

/* ── PHASE VIEW ── */
.phase-view { padding:28px 32px 60px; max-width:860px }
.phase-kicker { font-size:.6rem; letter-spacing:4px; text-transform:uppercase; color:var(--gold); font-family:'DM Mono',monospace; margin-bottom:8px }
.phase-title { font-family:'Playfair Display',serif; font-size:1.75rem; color:var(--text); margin-bottom:6px }
.phase-desc-text { font-size:.82rem; color:var(--text2); line-height:1.65; max-width:560px; margin-bottom:24px }

.phase-toolbar { display:flex; align-items:center; gap:10px; margin-bottom:20px; flex-wrap:wrap }
.status-group { display:flex; gap:4px; background:var(--surface); border:1px solid var(--border); border-radius:24px; padding:3px }
.spill { padding:4px 12px; border-radius:20px; border:none; font-size:.65rem; background:transparent; color:var(--text3); cursor:pointer; transition:var(--tr); font-family:'DM Sans',sans-serif; font-weight:500 }
.spill:hover { background:var(--bg2) }
.spill.s-todo.on { background:var(--surface); color:var(--text2); box-shadow:var(--sh-sm) }
.spill.s-active.on { background:var(--warn-bg); color:var(--warn) }
.spill.s-done.on { background:var(--ok-bg); color:var(--ok) }

.btn-gen { display:inline-flex; align-items:center; gap:8px; padding:9px 20px; border-radius:var(--rs); background:var(--navy2); border:none; color:#F8F6F2; font-size:.78rem; font-weight:600; cursor:pointer; transition:var(--tr); font-family:'DM Sans',sans-serif; margin-left:auto }
.btn-gen:hover:not(:disabled) { background:var(--navy3); transform:translateY(-1px); box-shadow:0 4px 16px rgba(26,46,68,.25) }
.btn-gen:disabled { opacity:.45; cursor:default }
.btn-gen svg { width:14px; height:14px }

.card { background:var(--surface); border-radius:var(--r); box-shadow:var(--sh-sm); overflow:hidden; margin-bottom:16px; border:1px solid var(--border) }
.card-head { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border); background:var(--bg) }

.prompt-pre { padding:16px 18px; font-family:'DM Mono',monospace; font-size:.7rem; line-height:1.8; color:var(--text2); white-space:pre-wrap; max-height:280px; overflow-y:auto; scrollbar-width:thin; background:var(--bg) }

.notes-area { width:100%; min-height:80px; padding:14px 16px; background:var(--surface); border:none; color:var(--text3); font-family:'DM Sans',sans-serif; font-size:.78rem; line-height:1.6; resize:vertical; outline:none }
.notes-area:focus { color:var(--text2) }

.phase-nav { display:flex; align-items:center; justify-content:space-between; margin-top:20px }

/* ── ASSEMBLY ── */
.assembly-view { padding:28px 32px 60px; max-width:760px }
.assembly-status { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:24px }
.ast-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--rs); padding:14px 16px; box-shadow:var(--sh-sm) }

.ast-label { font-size:.68rem; color:var(--text3); margin-top:2px }
.assembly-phases { background:var(--surface); border-radius:var(--r); border:1px solid var(--border); overflow:hidden; margin-bottom:24px; box-shadow:var(--sh-sm) }
.aph-item { display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid var(--border) }
.aph-item:last-child { border-bottom:none }
.aph-num { font-family:'DM Mono',monospace; font-size:.62rem; color:var(--text3); width:20px }
.aph-title { font-size:.8rem; color:var(--text2); flex:1 }
.aph-badge { font-size:.62rem; padding:3px 10px; border-radius:10px; font-weight:500 }
.aph-ok { background:var(--ok-bg); color:var(--ok) }
.aph-miss { background:var(--bg); color:var(--text3); border:1px solid var(--border) }
.assembly-actions { display:flex; gap:12px; flex-wrap:wrap }
.btn-assemble { display:inline-flex; align-items:center; gap:10px; padding:14px 28px; background:linear-gradient(135deg,var(--navy2),var(--navy3)); color:#F8F6F2; border:none; border-radius:var(--r); font-size:.9rem; font-weight:600; cursor:pointer; transition:var(--tr); font-family:'DM Sans',sans-serif; box-shadow:0 4px 16px rgba(26,46,68,.2) }

.btn-download { display:inline-flex; align-items:center; gap:8px; padding:12px 24px; background:var(--gold); color:var(--navy); border:none; border-radius:var(--r); font-size:.85rem; font-weight:600; cursor:pointer; transition:var(--tr); font-family:'DM Sans',sans-serif }
.btn-download:hover { background:var(--gold2); transform:translateY(-1px) }
.assembly-output { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; margin-top:20px; box-shadow:var(--sh-sm) }

/* ── CHECKLIST ── */
.check-view { padding:28px 32px 60px; max-width:680px }
.check-list { background:var(--surface); border-radius:var(--r); box-shadow:var(--sh-sm); overflow:hidden; margin-bottom:20px; border:1px solid var(--border) }
.ci { display:flex; align-items:flex-start; gap:12px; padding:14px 18px; border-bottom:1px solid var(--border); cursor:pointer; transition:var(--tr) }

.ci:hover { background:var(--bg) }

.ci-box { width:20px; height:20px; border-radius:5px; border:1.5px solid var(--border-mid); flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; transition:var(--tr); background:var(--surface) }
.ci.on .ci-box { background:var(--ok); border-color:var(--ok) }

.ci-t { font-size:.82rem; color:var(--text2); line-height:1.5 }

.cr-l { font-size:.72rem; color:var(--text3); margin-bottom:14px }
.cr-b { display:inline-block; padding:8px 22px; border-radius:20px; font-size:.75rem; font-weight:600 }
.cr-ok { background:var(--ok-bg); color:var(--ok); border:1px solid var(--ok) }
.cr-nok { background:var(--gold-pale); color:var(--gold); border:1px solid var(--gold-border) }

/* ── MODAL ── */
.moverlay { position:fixed; inset:0; background:rgba(26,46,68,.5); z-index:200; display:flex; align-items:center; justify-content:center; padding:24px; backdrop-filter:blur(4px) }
.modal { background:var(--surface); border-radius:var(--r); padding:28px 32px; max-width:460px; width:100%; box-shadow:var(--sh-lg); border:1px solid var(--border) }
.modal-title { font-family:'Playfair Display',serif; font-size:1.2rem; color:var(--text); margin-bottom:6px }
.modal-desc { font-size:.8rem; color:var(--text2); line-height:1.6; margin-bottom:22px }
.modal-field { margin-bottom:14px }
.modal-label { font-size:.65rem; text-transform:uppercase; letter-spacing:.07em; color:var(--text3); margin-bottom:6px; display:block }
.modal-input { width:100%; padding:9px 13px; background:var(--bg); border:1.5px solid var(--border); border-radius:var(--rs); color:var(--text); font-family:'DM Sans',sans-serif; font-size:.85rem; outline:none; transition:var(--tr) }
.modal-input:focus { border-color:var(--gold) }
.modal-input.mono { font-family:'DM Mono',monospace; font-size:.72rem }
textarea.modal-input { min-height:120px; resize:vertical; line-height:1.6 }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:22px }

/* ── TOAST ── */
#toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--navy); color:#F8F6F2; border-radius:24px; padding:10px 22px; font-size:.78rem; z-index:500; opacity:0; transition:all .25s ease; pointer-events:none; white-space:nowrap; box-shadow:var(--sh-lg) }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0) }

/* ── SPINNER ── */
.spin { width:14px; height:14px; border:2px solid rgba(255,255,255,.25); border-top-color:#fff; border-radius:50%; animation:rot .7s linear infinite }
@keyframes rot { to { transform:rotate(360deg) } }

/* ── RESPONSIVE ── */
@media(max-width:700px) {
  .wg2, .wg3 { grid-template-columns:1fr }

<script>
// ══════════════════════════════════════════════════════════════
// DATA — PHASES V5

const PHASES = [
  { id:1, title:'Posture & Identité', sub:'Cadrage · Règles invariables', maxT:800,
    prompt:`Tu vas produire une Note de Synthèse personnalisée FYM (FreeYourMind).

Ce document n'est pas un portrait psychologique. Ce n'est pas un bilan de développement personnel. Ce n'est pas un programme de transformation.

C'est le résultat du croisement de 12 approches indépendantes appliquées à une seule personne. Ce croisement révèle les structures sous-jacentes de la personnalité — ce qui s'est construit, ce qui résiste, ce qui est déjà en mouvement.

CE DOCUMENT NE FAIT PAS : — Il ne dit pas qui vous êtes — Il ne dit pas qui vous devriez être — Il ne propose pas d'axes de croissance — Il ne valide pas, n'encourage pas, ne console pas — Il ne répète pas le même point sous des angles différents

CE DOCUMENT FAIT : Il montre comment la structure identitaire s'est construite dans le temps. Il nomme les mécaniques qui tournent automatiquement. Il identifie les tensions actives et les ressources réelles.

DESTINATION : Provoquer un léger vertige de reconnaissance — pas de la satisfaction flatteuse. "comment tu sais ça ?" avec inconfort = réussi. "C'est tellement moi !" avec satisfaction = raté.

RÈGLE ABSOLUE — AUCUNE RÉFÉRENCE EXTÉRIEURE AU PROFIL : Ce document ne fait jamais référence à son créateur, à l'architecte du projet, à l'équipe FYM, ni à aucune personne autre que celle dont le questionnaire a été traité.

RÈGLES : Vouvoiement. Voix d'un sage. Pas de jargon spirituel. 3500-4500 mots pour les 4 actes + prologue. Pas de listes à puces dans le corps narratif. Référence à l'âge réel.

INTERDIT : "votre potentiel" / "vous méritez" / "il est temps de" / "belle âme" / jargon spirituel / clichés de développement personnel / paternalisme / référence à l'éveil / citations de figures spirituelles / référence au créateur ou à la méthodologie FYM

RÈGLE CITATIONS : Une seule citation par note. Auteur inattendu. Jamais une figure spirituelle. Juste avant ou après le retournement.

Confirme que tu as compris et attends la Phase 2.

PHASE 1 TERMINÉE`},

  { id:2, title:'Questionnaire & Calculs', sub:'12 approches · 7 tensions', maxT:4000,
    prompt:`Voici le questionnaire rempli de la personne :

[QUESTIONNAIRE_DATA]

Effectue les deux calculs suivants :

CALCUL 1 — HUMAN DESIGN & GENE KEYS : Type · Profil · Autorité · Définition · Canaux · Portes · Gene Keys (Ombre–Don–Siddhi, 4 sphères)
CALCUL 2 — BAZI : Day Master · 4 piliers · éléments · carences · 10 cycles décennaux

Pour les 10 autres approches depuis les données du questionnaire :
— Thème astral / Astrologie karmique / Dashas védiques / Astrocartographie / Année personnelle
— Ennéagramme (Type, Aile, Sous-type, Niveau) — depuis réponses brutes
— SCT Loevinger (niveau 1-7) — depuis complétions de phrases
— Auto-observation (faible/partiel/actif/stable) / Individuation (réactive/intellectuelle/incarnée/engagée) / Ego dominant (défensif/performatif/spiritualisé/dissocié)
— Psychogénéalogie — depuis données de lignée

Puis identifie les 7 tensions structurelles majeures issues du croisement des 12 approches.

Présente sous forme structurée. N'invite pas à valider. N'annonce pas la rédaction.

PHASE 2 TERMINÉE`},

  { id:3, title:'Prologue & Acte I', sub:'Ce qui lit ces lignes · Ce qui a été reçu', maxT:8000,
    prompt:`Rédige le Prologue et l'Acte I.

PROLOGUE — "Ce qui lit ces lignes" : Adresse directe à la personne concrète — âge réel, date de naissance, faits biographiques bruts. Tableau de calibrage : SCT Loevinger · Ego dominant · Auto-observation · Individuation.

ACTE I — "Ce qui a été reçu" / Sous-titre : "Ce que vous n'avez pas choisi"
Sources : Psychogénéalogie · Gene Keys ombre · Astrologie karmique · BaZi socle · événements précoces
Ton : impersonnel, factuel, anthropologique. Pas de consolation.

Produis :
1. Paragraphe narratif d'entrée ("Avant que vous ayez un prénom, il y avait déjà quelque chose.")
2. Tableau Tensions/Atouts Couche 1 — minimum 5 lignes. Les deux colonnes sont vraies en même temps.
3. Phrase de transition vers l'Acte II.

PHASE 3 TERMINÉE`},

  { id:4, title:'Acte II & Acte III', sub:'Mécaniques automatiques · Programmation consciente', maxT:8000,
    prompt:`ACTE II — "Ce que ça a coûté et produit" / "Les mécaniques qui tournent toutes seules"
Sources : HD · Ennéagramme · Thème astral · Dashas formatrices

Produis :
1. Paragraphe narratif d'entrée.
2. Tableau croisé Tensions/Atouts Couche 2 — minimum 5 lignes.
3. Tableau "La Mécanique Centrale" — forces en sens opposés — minimum 5 forces.
4. Croisements inédits — minimum 5.
5. Le retournement — sans titre, sans signal, une seule fois, 150 mots max.

ACTE III — "Ce que vous en faites" / "La programmation consciente — et les territoires où elle se joue"
Sources : HD × Ennéagramme × résistances × patterns × SCT × ego dominant

Produis :
1. Paragraphe narratif d'entrée.
2. Tableau Tensions/Atouts Couche 3 — minimum 4 lignes.
3. Tableau "Ce qui freine et ce qui libère" : Stratégie · Ce qu'elle protège · Ce qu'elle coûte · Le déplacement possible. Minimum 5 lignes.
4. Les 7 Territoires — titre · 2-3 paragraphes · bloc "Ce qui est possible" (instruction concrète, pas une invitation).
Territoires : Les Rôles · Le Vide Fertile · Les Miroirs · Les Ressources · Les Pertes · La Traversée · L'Appel

PHASE 4 TERMINÉE`},

  { id:5, title:'Acte IV', sub:'Le moment · Le lieu · Ce qui devient possible', maxT:8000,
    prompt:`ACTE IV — "Le moment précis. Le lieu exact. Ce que ça rend possible maintenant."
Sources : Dashas · Transits · Année personnelle · Astrocartographie · inscription corporelle

Produis :
1. Paragraphe d'entrée ("Les trois actes précédents décrivent votre architecture. Cet acte est différent.")
2. Tableau "Le Moment" — minimum 4 lignes.
3. Tableau "Le Lieu" — astrocartographie — tous lieux significatifs.
4. Tableau "Fenêtres d'action" — 3 périodes sur 24 mois.
5. Paragraphe "Le Corps comme information".
6. Paragraphe "Ce qui est déjà en mouvement" — observation factuelle.

ACTE IV SUITE — "Ce qui se fait quand rien ne monopolise l'attention"
TEMPS 1 — Bilan empirique : avec les mots exacts de la personne. Factuel et inévitable.
TEMPS 2 — La mécanique peur/désir : nommer comme mécaniques. Montrer que le combat les renforce. INTERDIT : "laissez passer" / "observez" / "restez présent"
TEMPS 3 — Pointeur calibré : fort pilotage → koan / pilotage moyen → observation du gap / faible → question concrète récente

CLÔTURE INVARIABLE :
"Ce qui crée en vous ne vous a jamais demandé la permission.
Il a toujours su où était le souffle."

PHASE 5 TERMINÉE`},

  { id:'6a', title:'Tribu — Soumission', sub:'14 propositions · Attente validation', maxT:3000,
    prompt:`Identifier les 7 mécaniques les plus actives. Proposer :

LES AMIS QUI VOUS COÛTENT CHER — 7 propositions :
| # | Source système | Nom proposé | Punch line proposée |

LES VRAIS AMIS — 7 contreparties :
| # | Contrepartie de | Nom proposé | Punch line proposée |

RÈGLES NOMS : Inventif, mémorable, spécifique. Jamais recyclé. Vrai ami = même silhouette, direction opposée.
RÈGLES PUNCH LINES : Voix intérieure · personnage se trahit · rythme retourne l'argument · lecteur reconnaît ET sourit.
SYMÉTRIE : punchline vrai ami #1 répond structurellement à la punchline cher ami #1.

Affiche uniquement les deux tableaux. Aucun commentaire après.

PHASE 6 — SOUMISSION TERMINÉE · EN ATTENTE VALIDATION`},

  { id:'6b', title:'Tribu — Rédaction', sub:'14 portraits complets · Cercle SVG', maxT:8000,
    prompt:`Les noms et punch lines ayant été validés, rédige le chapitre complet.

PARTIE 1 — LES AMIS QUI VOUS COÛTENT CHER : Introduction (2-3 phrases ironiques). Pour chacun des 7 : Numéro · Source · Nom · Sous-titre (3 mots-clés) · Portrait (3-4 paragraphes scène concrète) · Sa mécanique · Punch line en italique.

PARTIE 2 — LES VRAIS AMIS : même structure, direction opposée.

PARTIE 3 — SYNTHÈSE RÉDIGÉE : 200-250 mots. Question : à qui est le micro, là, maintenant ?

CERCLE DE LA TRIBU — SVG : cercle tracé, 14 noms en ronde. 7 "chers amis" moitié supérieure (#1A2E44). 7 "vrais amis" moitié inférieure (#C8956A). Nom gras + punch line italique orientés tangentiellement. Aucun visuel de personnage.

PHASE 6 TERMINÉE`},

  { id:7, title:'Annexe, Miroir & Clôture', sub:'6 tableaux · Miroir · Texte final', maxT:6000,
    prompt:`ANNEXE PRATIQUE :
Introduction : "Ce qui suit n'est pas un programme de développement personnel. Ce sont des conditions concrètes..."

Tableaux :
A — Activités physiques : Activité · Fréquence · Pourquoi ce profil
B — Activités créatives : Activité · Format · Pourquoi · Comment démarrer
C — Activités culturelles : Domaine · Exemples · Effet
D — Régime alimentaire : Orientation · Aliments/Pratique · Justification
E — Rythme quotidien : Heure · Pratique · Durée · Pourquoi
F — Rituels de vigilance situationnelle : Situation · Ce qui se passe · Le rituel

MIROIR FINAL : Ce que ce lecteur va probablement faire avec ce document — ses mécaniques spécifiques. Puis : une seule chose concrète juste. INTERDIT : "votre potentiel".

CLÔTURE INVARIABLE :
"Imprimez ce document. Rangez-le quelque part de concret — pas dans un dossier numérique.

Dans six mois, un an, relisez une section au hasard. Pas pour mesurer vos progrès. Pour vous rappeler ce qui est là, sous le bruit. Ce document ne vieillit pas. Vous non plus, à cet endroit-là."

En italique : "La créativité ne se libère pas. Elle se révèle."

Rien après cette ligne. Pas un mot.

PHASE 7 TERMINÉE`},

  { id:8, title:'Page Signature', sub:'Fond navy · Or · Page blanche', maxT:300,
    prompt:`Page signature UNIQUEMENT EN FIN DE DOCUMENT :
Fond #1A2E44. Centré verticalement. Ligne 1 : FREE YOUR MIND (#8C9DAD, petit, espacé). Filet or (#C8956A) 8cm centré au-dessus et en-dessous. Ligne 2 : "Vous n'êtes pas le créateur." (blanc, gras, grand). Ligne 3 : "Vous êtes la création." (or #C8956A, gras, grand).
Suivi d'une page blanche intentionnelle.

PHASE 8 TERMINÉE`}
];

const CHECKLIST = [
  'Chaque paragraphe narratif est-il injustifiable pour quelqu\'un d\'autre que ce profil ?',
  'L\'Acte II surprend-il le lecteur — ou se contente-t-il de décrire ?',
  'Le retournement arrive-t-il une seule fois, sans signal, en 150 mots maximum ?',
  'Y a-t-il un seul mot d\'encouragement, de validation ou de compassion performative ?',
  'Les 7 territoires se terminent-ils tous par une instruction concrète — pas une invitation ?',
  'Les 14 personnages sont-ils entièrement originaux — aucun recyclé d\'un autre profil ?',
  'Chaque ligne des préconisations est-elle justifiée par au moins un système du profil ?',
  'La clôture se termine-t-elle exactement sur la signature — rien après ?',
  'L\'Acte IV Suite est-il empirique et personnel — zéro référence spirituelle, zéro prescription ?',
  'Les noms et punch lines des personnages ont-ils été validés avant rédaction ?',
  'Le document ne contient-il aucune référence à son créateur, à l\'architecte ou à la méthodologie FYM ?'
];

const Q_STEPS = [
  { id:'A', letter:'A', title:'Identité & biographie', intro:'Ces données sont la base de votre étude.' },
  { id:'B', letter:'B', title:'Lignée & psychogénéalogie', intro:'Héritages énergétiques, culturels et familiaux.' },
  { id:'C', letter:'C', title:'Processus d\'éveil', intro:'Soyez aussi concret que possible.' },
  { id:'D', letter:'D', title:'Ennéagramme', intro:'Répondez spontanément, sans chercher à identifier votre type.' },
  { id:'E', letter:'E', title:'SCT Loevinger', intro:'Complétez ces phrases spontanément, sans chercher la cohérence.' },

];

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════

let S = { apiKey:'', profiles:[] };
let QD = {};
let QSTEP = 0;
let CUR_PROFILE = null;
let CUR_PHASE = 1;
let GENERATING = false;
let STOP_GEN = false;
let CUR_READER = null;

function loadState() {
  try {
    const d = JSON.parse(localStorage.getItem('fym3')||'{}');
    S.apiKey = d.apiKey||''; S.profiles = d.profiles||[];
  } catch(e){}
  try { QD = JSON.parse(localStorage.getItem('fym3_q')||'{}'); } catch(e){}
}
function save() { localStorage.setItem('fym3', JSON.stringify(S)); }
function saveQ() { localStorage.setItem('fym3_q', JSON.stringify(QD)); }
function clearQ() { QD={}; localStorage.removeItem('fym3_q'); }

function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function el(id) { return document.getElementById(id); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toast(msg, type='') {
  const t=el('toast'); t.textContent=msg; t.className=type?`show ${type}`:'show';
  setTimeout(()=>t.className='',2400);
}
function copyText(txt) {
  if (!txt){toast('Rien à copier');return;}
  navigator.clipboard.writeText(txt).then(()=>toast('✓ Copié','ok')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('✓ Copié','ok');
  });
}

function getProfile(id) { return S.profiles.find(p=>p.id===id); }
function phasePct(p) {
  const done=PHASES.filter(ph=>p.phases?.[ph.id]?.status==='done').length;
  return Math.round(done/PHASES.length*100);
}
function go(h) { location.hash=h; }

// ══════════════════════════════════════════════════════════════
// ROUTER
// ══════════════════════════════════════════════════════════════

function route(hash) {
  const h=(hash||'').replace('#','');
  if (!h||h==='landing') { renderLanding(); return; }
  if (h==='questionnaire'||h.startsWith('questionnaire/')) {
    const step=parseInt(h.split('/')[1])||0;
    QSTEP=step; renderQuestionnaire(); return;
  }
  if (h==='merci') { renderSuccess(); return; }
  if (h==='production') { renderProduction(); return; }
  if (h.startsWith('profile/')) {
    const parts=h.split('/');
    CUR_PROFILE=parts[1];
    CUR_PHASE=parts[3]||PHASES[0].id;
    renderProfile(); return;
  }
  if (h.startsWith('import/')) { importCode(h.slice(7),true); return; }
  renderLanding();
}

function F(name,label,type='text',ph='',cls='') {
  if(type==='ta') return `<div class="wf"><label class="wlabel">${label}</label><textarea class="winput ${cls}" name="${name}" placeholder="${ph}"></textarea></div>`;

function CHK(name,val,label) {
  const on=Array.isArray(QD[name])&&QD[name].includes(val);

function restoreQ() {
  document.querySelectorAll('[name]').forEach(el => {
    const v=QD[el.name]; if(!v) return;
    if(el.tagName==='INPUT'||el.tagName==='TEXTAREA') el.value=v;
  });
}

function attachQ() {
  document.querySelectorAll('input[name],textarea[name]').forEach(i=>{
    i.addEventListener('input',()=>{ QD[i.name]=i.value; saveQ(); });
  });
  document.querySelectorAll('[data-chk]').forEach(l=>{
    l.addEventListener('click',()=>{
      const n=l.dataset.chk, v=l.dataset.val;
      if(!Array.isArray(QD[n])) QD[n]=[];
      const idx=QD[n].indexOf(v);
      idx===-1?(QD[n].push(v),l.classList.add('on')):(QD[n].splice(idx,1),l.classList.remove('on'));
      saveQ();
    });
  });
  document.querySelectorAll('[data-rad]').forEach(r=>{
    r.addEventListener('click',()=>{
      const n=r.dataset.rad, v=r.dataset.val;
      QD[n]=v; saveQ();
      document.querySelectorAll(`[data-rad="${n}"]`).forEach(x=>x.classList.remove('on'));
      r.classList.add('on');
    });
  });
}

function jumpStep(i) { QSTEP=i; renderQuestionnaire(); el('wiz-page')?.scrollTo(0,0); }
function qPrev() { if(QSTEP>0){QSTEP--;renderQuestionnaire();el('wiz-page')?.scrollTo(0,0);} }
function qNext() {
  if(QSTEP<Q_STEPS.length-1){QSTEP++;renderQuestionnaire();el('wiz-page')?.scrollTo(0,0);}
  else qFinish();
}
function qFinish() { QD._completedAt=new Date().toISOString(); saveQ(); go('merci'); }

function modal(html) {
  const d=document.createElement('div'); d.className='moverlay'; d.id='modal';
  d.innerHTML=`<div class="modal">${html}</div>`;
  d.addEventListener('click',e=>{ if(e.target===d) closeModal(); });
  document.body.appendChild(d);
}
function closeModal() { el('modal')?.remove(); }

function doImport() {
  let raw=(el('icode')?.value||'').trim();
  if(raw.includes('#import/')) raw=raw.split('#import/')[1];
  importCode(raw, false);
  closeModal();
}

function importCode(code, autoNav) {
  const data=decodeCode(code.trim());
  if(!data){ toast('Code invalide','err'); if(autoNav) go('production'); return; }
  const name=data.date_naissance?`Profil — ${data.date_naissance}`:'Profil importé';
  S.profiles.push({id:uid(),name,createdAt:new Date().toISOString(),questionnaire:data,phases:{},checks:{}});
  save();
  toast('✓ Profil importé','ok');
  if(autoNav) go('production'); else renderProduction();
}

function createProfile() {
  const name=(el('mpname')?.value||'').trim()||'Nouveau profil';
  const p={id:uid(),name,createdAt:new Date().toISOString(),questionnaire:{},phases:{},checks:{}};
  S.profiles.push(p); save(); closeModal();
  openProfile(p.id);
}

function delProfile(id) {
  if(!confirm('Supprimer ce profil ? Action irréversible.')) return;
  S.profiles=S.profiles.filter(p=>p.id!==id); save(); renderProduction();
}

function openProfile(id) {
  CUR_PROFILE=id; CUR_PHASE=PHASES[0].id;

}

function savePhaseContent() {
  const p=getProfile(CUR_PROFILE);
  if(!p.phases[CUR_PHASE]) p.phases[CUR_PHASE]={};
  p.phases[CUR_PHASE].content=el('gout')?.value||'';
  p.phases[CUR_PHASE].notes=el('nota')?.value||'';
  save(); toast('✓ Sauvegardé','ok');
}

function getFullPrompt() {
  const p=getProfile(CUR_PROFILE);
  const ph=PHASES.find(x=>String(x.id)===String(CUR_PHASE));
  if(!ph) return '';
  if(ph.id===2&&p.questionnaire) return ph.prompt.replace('[QUESTIONNAIRE_DATA]',formatQ(p.questionnaire));
  return ph.prompt;

function refreshSidebar() {
  const p=getProfile(CUR_PROFILE);
  document.querySelectorAll('.ps-item').forEach(item=>{
    const num=item.querySelector('.ps-item-num')?.textContent;
    if(!num?.startsWith('P')) return;
    const pid=num.slice(1);
    const st=p.phases?.[pid]?.status||'todo';
    const dot=item.querySelector('.ps-dot');
    if(dot) dot.className=`ps-dot ${st==='done'?'d-done':st==='active'?'d-active':'d-todo'}`;
  });
  // Update progress
  const pct=phasePct(p);
  const done=PHASES.filter(ph=>p.phases?.[ph.id]?.status==='done').length;
  const fill=document.querySelector('.ps-prog-fill');
  if(fill) fill.style.width=pct+'%';
  const lbl=document.querySelector('.ps-prog-label span:last-child');
  if(lbl) lbl.textContent=`${done}/${PHASES.length}`;

function assembleNote() {
  const p=getProfile(CUR_PROFILE);
  const prenom=p.name||'';
  const dob=p.questionnaire?.date_naissance||'';
  const today=new Date().toLocaleDateString('fr-FR');

  // Collect phase content
  const get=(id)=>p.phases?.[id]?.content||'';
  const c3=get(3), c4=get(4), c5=get(5), c6=get('6b'), c7=get(7);

  // md→html conversion
  function md(text) {
    if(!text) return '<p style="color:#888;font-style:italic">[Contenu non généré]</p>';
    let t=text;
    // Tables
    t=t.replace(/^\|(.+)\|\s*$/gm,(m,row)=>{
      if(row.includes('---')) return '';
      const cells=row.split('|').map(c=>`<td style="padding:8px 12px;border:1px solid #E0DAD2;font-size:13px">${c.trim()}</td>`).join('');
      return `<tr>${cells}</tr>`;
    });
    t=t.replace(/<tr>[\s\S]*?<\/tr>/g,m=>`<table style="width:100%;border-collapse:collapse;margin:16px 0">${m}</table>`);
    // Headers
    t=t.replace(/^### (.+)$/gm,'<h4 style="font-family:Playfair Display,serif;font-size:16px;color:#1A2E44;margin:20px 0 8px">$1</h4>');
    t=t.replace(/^## (.+)$/gm,'<h3 style="font-family:Playfair Display,serif;font-size:19px;color:#1A2E44;margin:28px 0 10px;border-bottom:1px solid #E0DAD2;padding-bottom:8px">$1</h3>');
    t=t.replace(/^# (.+)$/gm,'<h2 style="font-family:Playfair Display,serif;font-size:22px;color:#1A2E44;margin:36px 0 12px">$1</h2>');
    // Bold/italic
    t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    t=t.replace(/\*(.+?)\*/g,'<em>$1</em>');
    // HR
    t=t.replace(/^---+$/gm,'<hr style="border:none;border-top:1px solid #E0DAD2;margin:24px 0">');
    // Paragraphs
    t=t.split('\n\n').map(para=>{
      para=para.trim();
      if(!para) return '';
      if(para.startsWith('<')) return para;
      return `<p style="margin:0 0 16px;line-height:1.8;font-size:14.5px;color:#2A3A4A">${para.replace(/\n/g,'<br>')}</p>`;
    }).join('\n');
    return t;
  }

  const introText=`Il existe de très nombreux modèles d'analyse de la psyché humaine. Ils sont tous utiles, mais avec des axes d'analyse différents : profils de personnalité, structures d'ombre, généalogie, cycles temporels.<br><br>
Pris séparément, chacun éclaire une facette de la structure personnelle. Il n'existe pas de solution aujourd'hui pour avoir une vision absolue de la structure humaine interne.<br><br>
Le projet FYM n'a pas cette ambition.<br><br>
Toutefois, en rapprochant des modèles indépendants choisis pour leur complémentarité il permet d'identifier leurs synergies et leurs contradictions. Ce sont précisément ces contradictions qui correspondent à nos conflits intérieurs les plus actifs.<br><br>
Les voir nommées avec précision, depuis plusieurs angles simultanément, produit quelque chose que chaque approche isolée ne peut pas produire : une cartographie des structures sous-jacentes de la personnalité.<br><br>
Ce document est le résultat de ce croisement appliqué à un individu unique.<br><br>
<strong>Ce que ce document ne fait pas :</strong><br>
— Il ne dit pas qui vous êtes<br>
— Il ne dit pas qui vous devriez être<br>
— Il ne propose pas de programme de transformation<br>
— Il ne cherche pas à vous valider, vous encourager ou à vous consoler.<br><br>
<strong>Ce que ce document fait :</strong><br>

— Il identifie ce qui freine et ce qui est déjà là.<br>

<em style="font-family:Playfair Display,serif;font-size:16px">« La créativité ne se libère pas. Elle se révèle. »</em>`;

  const html=`<!DOCTYPE html>

function renderChecklist() {
  const p=getProfile(CUR_PROFILE);
  const checked=Object.values(p.checks||{}).filter(Boolean).length;
  el('pmain').innerHTML=`<div class="check-view">
    <div class="phase-kicker">Vérification finale</div>
    <h2 class="phase-title">11 points · Avant livraison</h2>
    <p class="phase-desc-text" style="margin-bottom:24px">Cochez chaque point. Les 11 doivent être satisfaisants.</p>
    <div class="check-list">
      ${CHECKLIST.map((t,i)=>{
        const on=p.checks?.[i]||false;
        return `<div class="ci ${on?'on':''}" onclick="toggleCI(${i},this)">
          <div class="ci-box"><svg viewBox="0 0 12 9" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,4.5 4.5,8 11,1"/></svg></div>
          <span class="ci-n">${String(i+1).padStart(2,'0')}</span>
          <span class="ci-t">${esc(t)}</span>
        </div>`;
      }).join('')}
    </div>
    <div class="check-result">
      <div class="cr-n" id="crn">${checked}/11</div>
      <div class="cr-l">points validés</div>
      <div class="${checked===11?'cr-b cr-ok':'cr-b cr-nok'}" id="crb">
        ${checked===11?'✓ NOTE FYM V5 PRODUITE':`En cours (${11-checked} restants)`}
      </div>
    </div>
  </div>`;
}

function toggleCI(i, el) {
  const p=getProfile(CUR_PROFILE);
  if(!p.checks) p.checks={};
  p.checks[i]=!p.checks[i]; save();
  el.classList.toggle('on',p.checks[i]);
  const c=Object.values(p.checks).filter(Boolean).length;
  const n=document.getElementById('crn'), b=document.getElementById('crb');
  if(n) n.textContent=`${c}/11`;
  if(b){ b.textContent=c===11?'✓ NOTE FYM V5 PRODUITE':`En cours (${11-c} restants)`; b.className=c===11?'cr-b cr-ok':'cr-b cr-nok'; }
}

// ══════════════════════════════════════════════════════════════
// CLAUDE API
// ══════════════════════════════════════════════════════════════

function buildMessages(profile, targetId) {
  const msgs=[];
  const tIdx=PHASES.findIndex(x=>String(x.id)===String(targetId));
  msgs.push({role:'user',content:PHASES[0].prompt});
  msgs.push({role:'assistant',content:'Compris. Posture intégrée. Prêt pour la Phase 2.'});
  for(let i=1;i<tIdx;i++){
    const ph=PHASES[i];
    let uc=ph.prompt;
    if(ph.id===2&&profile.questionnaire) uc=uc.replace('[QUESTIONNAIRE_DATA]',formatQ(profile.questionnaire));
    msgs.push({role:'user',content:uc});
    const out=profile.phases?.[ph.id]?.content;
    msgs.push({role:'assistant',content:out||`[Phase ${ph.id} — non encore générée]`});
  }
  let cur=PHASES[tIdx].prompt;
  if(PHASES[tIdx].id===2&&profile.questionnaire) cur=cur.replace('[QUESTIONNAIRE_DATA]',formatQ(profile.questionnaire));
  msgs.push({role:'user',content:cur});
  return msgs;
}

async function generatePhase() {
  if(GENERATING) return;
  if(!S.apiKey){toast('Clé API requise','err');return;}
  const profile=getProfile(CUR_PROFILE);
  const ph=PHASES.find(x=>String(x.id)===String(CUR_PHASE));
  if(!profile||!ph) return;

  GENERATING=true; STOP_GEN=false;
  const bgen=el('bgen'), bstop=el('bstop'), gout=el('gout');
  if(bgen){bgen.disabled=true;bgen.innerHTML='<div class="spin"></div> Génération…';}
  if(bstop) bstop.style.display='inline-flex';
  if(gout){gout.value='';gout.classList.add('streaming');}

  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:ph.maxT||4000,stream:true,messages:buildMessages(profile,CUR_PHASE)})
    });
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||`Erreur ${res.status}`);}
    CUR_READER=res.body.getReader();
    const dec=new TextDecoder();
    let full='';
    while(true){
      if(STOP_GEN){CUR_READER.cancel();break;}
      const {done,value}=await CUR_READER.read();
      if(done) break;
      for(const line of dec.decode(value,{stream:true}).split('\n')){
        if(!line.startsWith('data: ')) continue;
        const d=line.slice(6).trim();
        if(!d||d==='[DONE]') continue;
        try{
          const j=JSON.parse(d);
          if(j.type==='content_block_delta'&&j.delta?.type==='text_delta'){
            full+=j.delta.text;
            if(gout){gout.value=full;gout.scrollTop=gout.scrollHeight;}
          }
        }catch(e){}
      }
    }
    if(!profile.phases[CUR_PHASE]) profile.phases[CUR_PHASE]={};
    profile.phases[CUR_PHASE].content=full;
    profile.phases[CUR_PHASE].status=full?'done':'todo';
    save();
    if(full) toast('✓ Génération terminée et sauvegardée','ok');
    refreshSidebar();
  } catch(err){
    toast('Erreur : '+err.message,'err');
    if(gout) gout.value=(gout.value||'')+'\n\n[Erreur : '+err.message+']';
  } finally {
    GENERATING=false; CUR_READER=null;
    if(bgen){bgen.disabled=!S.apiKey;bgen.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><polygon points="13,2 3,14 12,14 11,22 21,10 12,10 13,2"/></svg> Générer avec Claude';}
    if(bstop) bstop.style.display='none';
    if(gout) gout.classList.remove('streaming');
  }
}

function stopGen(){STOP_GEN=true;if(CUR_READER) CUR_READER.cancel().catch(()=>{});toast('Génération arrêtée');}

// QUESTIONNAIRE FORMAT
// ══════════════════════════════════════════════════════════════

function formatQ(q) {
  if(!q||!Object.keys(q).length) return '[Questionnaire non rempli]';
  const L=(label,val)=>`${label} : ${val||'N/A'}\n`;
  const C=(vals)=>Array.isArray(vals)&&vals.length?vals.join(', '):'Aucun';
  let t='════════════════════════════════════════\nQUESTIONNAIRE FYM V4\n════════════════════════════════════════\n\n';
  t+='━━━ SECTION A — IDENTITÉ & BIOGRAPHIE ━━━\n\n';
  t+=L('Date de naissance',q.date_naissance)+L('Heure de naissance',q.heure_naissance)+L('Lieu de naissance',q.lieu_naissance);
  t+=L('Résidence',q.residence)+L('Sexe',q.sexe)+L('Fratrie',q.fratrie)+L('Situation',q.situation)+L('Situation parents',q.situation_parents)+L('Heure réveil',q.reveil)+L('Saison vitalité',q.saison);
  t+='\nLIEUX DE VIE :\n';
  for(let i=1;i<=5;i++) if(q[`lieu_${i}`]) t+=`${i}. ${q[`lieu_${i}`]} — ${q[`periode_${i}`]||''}\n`;
  t+=`\nÉVÉNEMENTS MAJEURS :\n${q.event_1?'— '+q.event_1+'\n':''}${q.event_2?'— '+q.event_2+'\n':''}${q.event_3?'— '+q.event_3+'\n':''}`;
  t+=`\nPATTERNS : ${C(q.pat)}\n${q.pat_autre?'Autre : '+q.pat_autre+'\n':''}`;
  t+=`\nQ_action : ${q.action_q1||'N/A'}\nQ_corps : ${q.action_q2||'N/A'}\nQ_observateur : ${q.action_q3||'N/A'}\n`;
  t+=`\nRÉSISTANCES : ${C(q.res)}\n${q.res_autre?'Autre : '+q.res_autre+'\n':''}`;
  t+='\n━━━ SECTION B — LIGNÉE & PSYCHOGÉNÉALOGIE ━━━\n\n';
  [['Père','pere'],['Mère','mere'],['GP paternel','gpat'],['GM paternelle','gmat_p'],['GP maternel','gmat'],['GM maternelle','gmam']].forEach(([l,k])=>{t+=`${l} : ${q[`${k}_dn`]||'N/A'} · ${q[`${k}_lieu`]||'N/A'}\n`;});
  if(q.lignee_events) t+=`\nÉvénements familiaux :\n${q.lignee_events}\n`;
  t+='\n━━━ SECTION C — PROCESSUS D\'ÉVEIL ━━━\n\n';
  t+=L('Depuis quand',q.depuis_quand)+`Déclencheurs : ${C(q.decl)}\n${q.decl_autre?'Autre : '+q.decl_autre+'\n':''}`;
  if(q.demarches) t+=`\nDémarches :\n${q.demarches}\n`;
  if(q.avancees) t+=`\nAvancées réelles :\n${q.avancees}\n`;
  if(q.resistance_c) t+=`\nCe qui résiste :\n${q.resistance_c}\n`;
  if(q.stade_actuel) t+=`\nStade actuel :\n${q.stade_actuel}\n`;
  t+=`\nPratique : ${C(q.pratique)}\n`;
  t+='\n━━━ SECTION D — ENNÉAGRAMME ━━━\n\n';
  if(q.enneagram_q1) t+=`Ce que je ne me permets pas :\n${q.enneagram_q1}\n\n`;
  if(q.enneagram_q2) t+=`Sous pression :\n${q.enneagram_q2}\n\n`;
  if(q.enneagram_q3) t+=`Rapport perfection/erreur :\n${q.enneagram_q3}\n\n`;
  if(q.enneagram_q4) t+=`Relations proches :\n${q.enneagram_q4}\n\n`;
  if(q.enneagram_q5) t+=`Ce que je redoute d'être vu comme :\n${q.enneagram_q5}\n\n`;
  t+='\n━━━ SECTION E — SCT LOEVINGER ━━━\n\n';
  [['critique','Quand on me critique'],['regles','Les règles'],['attends','Ce que j\'attends des autres'],['naccepte','Ce que je n\'accepte pas'],['difficulte','Ma principale difficulté'],['souffrance','La souffrance'],['fierte','Ce dont je suis fier(e)'],['jamais_dit','Ce que je n\'ai jamais dit'],['trompe','Quand je me trompe'],['vieillissant','En vieillissant']].forEach(([k,l])=>{if(q[`sct_${k}`])t+=`${l} :\n${q[`sct_${k}`]}\n\n`;});
  t+='\n━━━ SECTION F — AUTO-OBSERVATION ━━━\n\n';
  ['q1','q2','q3','q4','q5','q6','q7'].forEach(k=>{if(q[k])t+=`${k.toUpperCase()} : Réponse ${q[k]}\n`;});
  t+='\n';
  if(q.q8) t+=`Q8 — Ce que je ne me permets pas :\n${q.q8}\n\n`;
  if(q.q9) t+=`Q9 — Je suis là parce que :\n${q.q9}\n\n`;
  if(q.q10) t+=`Q10 — Ce que j'attends :\n${q.q10}\n\n`;
  if(q.q11) t+=`Q11 — Mal agir (exemple concret) :\n${q.q11}\n\n`;
  if(q.q12) t+=`Q12 — Ce que je ne veux pas changer :\n${q.q12}\n\n`;
  if(q.q13) t+=`Q13 — Ce que j'évite de regarder :\n${q.q13}\n\n`;
  return t;
}

function generateShareCode(q) { try{return btoa(unescape(encodeURIComponent(JSON.stringify(q))))}catch(e){return null} }
function decodeCode(c) { try{return JSON.parse(decodeURIComponent(escape(atob(c))))}catch(e){return null} }
